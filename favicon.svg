<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Chimney -->
  <rect x="21" y="5" width="3" height="10" fill="#1a1a18"/>
  <!-- Roof -->
  <polygon points="16,3 30,16 2,16" fill="#1a1a18"/>
  <!-- Roof ridge cap -->
  <line x1="16" y1="3" x2="16" y2="3" stroke="#1a1a18" stroke-width="1"/>
  <!-- House body — Falun red -->
  <rect x="4" y="16" width="24" height="13" fill="#8C2B2B"/>
  <!-- Left window -->
  <rect x="6" y="18" width="6" height="5" rx="0.5" fill="#f0ede6"/>
  <line x1="9" y1="18" x2="9" y2="23" stroke="#8C2B2B" stroke-width="0.8"/>
  <line x1="6" y1="20.5" x2="12" y2="20.5" stroke="#8C2B2B" stroke-width="0.8"/>
  <!-- Right window -->
  <rect x="20" y="18" width="6" height="5" rx="0.5" fill="#f0ede6"/>
  <line x1="23" y1="18" x2="23" y2="23" stroke="#8C2B2B" stroke-width="0.8"/>
  <line x1="20" y1="20.5" x2="26" y2="20.5" stroke="#8C2B2B" stroke-width="0.8"/>
  <!-- Door -->
  <rect x="13" y="21" width="6" height="8" rx="0.75" fill="#f0ede6"/>
  <!-- Door knob -->
  <circle cx="18" cy="25.5" r="0.7" fill="#8C2B2B"/>
  <!-- Ground line -->
  <rect x="2" y="29" width="28" height="1.5" rx="0.5" fill="#1a1a18" opacity="0.25"/>
</svg>
